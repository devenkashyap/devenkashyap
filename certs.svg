<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 90" width="900" height="90">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#0f0a2e"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
  </defs>

  <rect width="900" height="90" fill="url(#bg)"/>

  <!-- Card 1: CSM -->
  <rect x="10" y="10" width="272" height="70" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <rect x="10" y="10" width="4" height="70" rx="2" fill="#7c3aed"/>
  <text x="28" y="38" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#94a3b8">🏆</text>
  <text x="55" y="36" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Certified ScrumMaster® (CSM®)</text>
  <text x="55" y="52" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="400" fill="#475569">Scrum Alliance</text>
  <text x="55" y="67" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="400" fill="#334155">Jan 2019</text>

  <!-- Card 2: PMP -->
  <rect x="314" y="10" width="272" height="70" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <rect x="314" y="10" width="4" height="70" rx="2" fill="#06b6d4"/>
  <text x="332" y="38" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#94a3b8">🎓</text>
  <text x="358" y="36" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">PMP® Certification Training</text>
  <text x="358" y="52" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="400" fill="#475569">Simplilearn</text>
  <text x="358" y="67" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="400" fill="#334155">Feb 2019</text>

  <!-- Card 3: SFPC -->
  <rect x="618" y="10" width="272" height="70" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <rect x="618" y="10" width="4" height="70" rx="2" fill="#10b981"/>
  <text x="636" y="38" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#94a3b8">📜</text>
  <text x="662" y="36" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Scrum Foundations Professional</text>
  <text x="662" y="52" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="400" fill="#475569">CertiProf · SFPC</text>
  <text x="662" y="67" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="400" fill="#334155">Jun 2020</text>
</svg>

<svg fill="none" viewBox="0 0 900 190" width="900" height="190" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .wrap {
          width: 900px; height: 190px;
          background: linear-gradient(180deg, #0d0d1a 0%, #0a1628 100%);
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          gap: 14px; padding: 16px 24px;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
          overflow: hidden;
        }
        .label {
          font-size: 9px; font-weight: 700;
          letter-spacing: 4px; text-transform: uppercase;
          color: rgba(255,255,255,0.25);
        }
        .row { display: flex; gap: 9px; }
        .chip {
          display: inline-flex; align-items: center; gap: 7px;
          padding: 7px 15px;
          border-radius: 100px;
          font-size: 11.5px; font-weight: 500;
          border: 1px solid rgba(255,255,255,0.1);
          background: rgba(255,255,255,0.04);
          color: rgba(255,255,255,0.72);
          white-space: nowrap;
          animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .chip:nth-child(1) { animation-delay: 0.04s; }
        .chip:nth-child(2) { animation-delay: 0.09s; }
        .chip:nth-child(3) { animation-delay: 0.14s; }
        .chip:nth-child(4) { animation-delay: 0.19s; }
        .chip:nth-child(5) { animation-delay: 0.24s; }
        @keyframes pop {
          from { opacity: 0; transform: scale(0.82) translateY(8px); }
          to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .purple { border-color: rgba(124,58,237,0.4); }
        .purple .dot { background: #a78bfa; box-shadow: 0 0 5px #7c3aed; }
        .cyan   { border-color: rgba(6,182,212,0.4); }
        .cyan   .dot { background: #67e8f9; box-shadow: 0 0 5px #06b6d4; }
        .green  { border-color: rgba(16,185,129,0.4); }
        .green  .dot { background: #6ee7b7; box-shadow: 0 0 5px #10b981; }
        .pink   { border-color: rgba(236,72,153,0.4); }
        .pink   .dot { background: #f9a8d4; box-shadow: 0 0 5px #ec4899; }
        .orange { border-color: rgba(249,115,22,0.4); }
        .orange .dot { background: #fdba74; box-shadow: 0 0 5px #f97316; }
        .blue   { border-color: rgba(59,130,246,0.4); }
        .blue   .dot { background: #93c5fd; box-shadow: 0 0 5px #3b82f6; }
      </style>
      <div class="wrap">
        <div class="label">Core Stack &amp; Capabilities</div>
        <div class="row">
          <div class="chip purple"><span class="dot"></span>Agile · Scrumban · SAFe</div>
          <div class="chip cyan"><span class="dot"></span>Jira · Confluence · Azure DevOps</div>
          <div class="chip green"><span class="dot"></span>n8n Workflow Automation</div>
          <div class="chip pink"><span class="dot"></span>GPT-4 · Claude · Gemini</div>
          <div class="chip blue"><span class="dot"></span>Power BI · Salesforce</div>
        </div>
        <div class="row">
          <div class="chip orange"><span class="dot"></span>PMO Architecture</div>
          <div class="chip purple"><span class="dot"></span>Agile Coaching &amp; Transformation</div>
          <div class="chip cyan"><span class="dot"></span>Change Management</div>
          <div class="chip green"><span class="dot"></span>Prompt Engineering</div>
          <div class="chip pink"><span class="dot"></span>Python · Excel · RAID Frameworks</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>

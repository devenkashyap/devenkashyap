<svg fill="none" viewBox="0 0 900 150" width="900" height="150" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .wrap {
          width: 900px; height: 150px;
          background: linear-gradient(180deg, #0a1628 0%, #0d0d1a 100%);
          display: flex; align-items: center;
          justify-content: center; gap: 12px;
          padding: 16px 20px;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        }
        .card {
          flex: 1;
          background: rgba(255,255,255,0.035);
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 14px;
          padding: 16px 14px 14px;
          display: flex; flex-direction: column; gap: 5px;
          position: relative; overflow: hidden;
          animation: slideUp 0.5s cubic-bezier(0.34,1.2,0.64,1) both;
          box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .card::before {
          content: '';
          position: absolute; top: 0; left: 0; right: 0; height: 2px;
        }
        .c1::before { background: linear-gradient(90deg, #7c3aed, #a855f7); }
        .c2::before { background: linear-gradient(90deg, #06b6d4, #0284c7); }
        .c3::before { background: linear-gradient(90deg, #10b981, #059669); }
        .c4::before { background: linear-gradient(90deg, #ec4899, #db2777); }
        .c5::before { background: linear-gradient(90deg, #f97316, #ea580c); }
        .c6::before { background: linear-gradient(90deg, #3b82f6, #2563eb); }
        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.11s; }
        .card:nth-child(3) { animation-delay: 0.17s; }
        .card:nth-child(4) { animation-delay: 0.23s; }
        .card:nth-child(5) { animation-delay: 0.29s; }
        .card:nth-child(6) { animation-delay: 0.35s; }
        @keyframes slideUp {
          from { opacity: 0; transform: translateY(16px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .icon { font-size: 18px; margin-bottom: 2px; }
        .num {
          font-size: 26px; font-weight: 900;
          color: #fff; letter-spacing: -1px; line-height: 1;
        }
        .c1 .num { color: #a78bfa; }
        .c2 .num { color: #67e8f9; }
        .c3 .num { color: #6ee7b7; }
        .c4 .num { color: #f9a8d4; }
        .c5 .num { color: #fdba74; }
        .c6 .num { color: #93c5fd; }
        .lbl {
          font-size: 9.5px; font-weight: 500; letter-spacing: 0.3px;
          color: rgba(255,255,255,0.38); line-height: 1.35;
        }
      </style>
      <div class="wrap">
        <div class="card c1"><div class="icon">👥</div><div class="num">60+</div><div class="lbl">People Led Across 7–8 Teams</div></div>
        <div class="card c2"><div class="icon">🌍</div><div class="num">2M+</div><div class="lbl">Customers in Banking Modernization</div></div>
        <div class="card c3"><div class="icon">🔄</div><div class="num">12</div><div class="lbl">Product Teams Transformed</div></div>
        <div class="card c4"><div class="icon">⚡</div><div class="num">15+</div><div class="lbl">Team Members Freed via n8n Automation</div></div>
        <div class="card c5"><div class="icon">📦</div><div class="num">5</div><div class="lbl">Parallel Initiatives Delivered</div></div>
        <div class="card c6"><div class="icon">⏱️</div><div class="num">70%</div><div class="lbl">Faster Escalation Resolution</div></div>
      </div>
    </div>
  </foreignObject>
</svg>

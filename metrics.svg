<svg fill="none" viewBox="0 0 900 160" width="900" height="160" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .wrap {
          width: 900px;
          height: 160px;
          background: linear-gradient(180deg, #0a1628 0%, #0d0d1a 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 14px;
          padding: 20px 24px;
          font-family: 'DM Sans', sans-serif;
        }

        .card {
          flex: 1;
          background: rgba(255,255,255,0.035);
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 16px;
          padding: 18px 20px;
          display: flex;
          flex-direction: column;
          gap: 6px;
          position: relative;
          overflow: hidden;
          animation: slideUp 0.6s cubic-bezier(0.34,1.2,0.64,1) both;
          box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        .card::before {
          content: '';
          position: absolute;
          top: 0; left: 0; right: 0;
          height: 2px;
        }

        .card.c1::before { background: linear-gradient(90deg, #7c3aed, #a855f7); }
        .card.c2::before { background: linear-gradient(90deg, #06b6d4, #0284c7); }
        .card.c3::before { background: linear-gradient(90deg, #10b981, #059669); }
        .card.c4::before { background: linear-gradient(90deg, #ec4899, #db2777); }
        .card.c5::before { background: linear-gradient(90deg, #f97316, #ea580c); }
        .card.c6::before { background: linear-gradient(90deg, #3b82f6, #2563eb); }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.12s; }
        .card:nth-child(3) { animation-delay: 0.19s; }
        .card:nth-child(4) { animation-delay: 0.26s; }
        .card:nth-child(5) { animation-delay: 0.33s; }
        .card:nth-child(6) { animation-delay: 0.40s; }

        @keyframes slideUp {
          from { opacity: 0; transform: translateY(20px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .emoji { font-size: 20px; margin-bottom: 4px; }

        .number {
          font-family: 'Syne', sans-serif;
          font-size: 28px;
          font-weight: 800;
          color: #fff;
          letter-spacing: -1px;
          line-height: 1;
        }

        .c1 .number { color: #a78bfa; }
        .c2 .number { color: #67e8f9; }
        .c3 .number { color: #6ee7b7; }
        .c4 .number { color: #f9a8d4; }
        .c5 .number { color: #fdba74; }
        .c6 .number { color: #93c5fd; }

        .label {
          font-size: 10px;
          font-weight: 500;
          letter-spacing: 0.5px;
          color: rgba(255,255,255,0.4);
          line-height: 1.3;
        }
      </style>

      <div class="wrap">
        <div class="card c1">
          <div class="emoji">👥</div>
          <div class="number">60+</div>
          <div class="label">People Led Across 7–8 Teams</div>
        </div>
        <div class="card c2">
          <div class="emoji">🌍</div>
          <div class="number">2M+</div>
          <div class="label">Customers in Banking Modernization</div>
        </div>
        <div class="card c3">
          <div class="emoji">🔄</div>
          <div class="number">12</div>
          <div class="label">Product Teams Transformed (Agile)</div>
        </div>
        <div class="card c4">
          <div class="emoji">⚡</div>
          <div class="number">15+</div>
          <div class="label">Team Members Freed via Automation</div>
        </div>
        <div class="card c5">
          <div class="emoji">📦</div>
          <div class="number">5</div>
          <div class="label">Parallel Initiatives Delivered</div>
        </div>
        <div class="card c6">
          <div class="emoji">⏱️</div>
          <div class="number">70%</div>
          <div class="label">Faster Escalation Resolution</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>

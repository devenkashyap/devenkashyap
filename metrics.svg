<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="900" height="140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
    <!-- Top bar gradients for each card -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#7c3aed"/><stop offset="100%" style="stop-color:#a855f7"/></linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#06b6d4"/><stop offset="100%" style="stop-color:#0284c7"/></linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#10b981"/><stop offset="100%" style="stop-color:#059669"/></linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#ec4899"/><stop offset="100%" style="stop-color:#db2777"/></linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f97316"/><stop offset="100%" style="stop-color:#ea580c"/></linearGradient>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3b82f6"/><stop offset="100%" style="stop-color:#2563eb"/></linearGradient>
  </defs>

  <rect width="900" height="140" fill="url(#bg)"/>

  <!-- Card 1 -->
  <rect x="10" y="16" width="135" height="108" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <rect x="10" y="16" width="135" height="3" rx="1.5" fill="url(#g1)"/>
  <text x="27" y="46" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#94a3b8">👥</text>
  <text x="27" y="80" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="900" fill="#a78bfa" letter-spacing="-1">60+</text>
  <text x="27" y="98" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">People Led</text>
  <text x="27" y="112" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">Across 7–8 Teams</text>

  <!-- Card 2 -->
  <rect x="155" y="16" width="135" height="108" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <rect x="155" y="16" width="135" height="3" rx="1.5" fill="url(#g2)"/>
  <text x="172" y="46" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#94a3b8">🌍</text>
  <text x="172" y="80" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="900" fill="#67e8f9" letter-spacing="-1">2M+</text>
  <text x="172" y="98" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">Customers in</text>
  <text x="172" y="112" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">Banking Modernization</text>

  <!-- Card 3 -->
  <rect x="300" y="16" width="135" height="108" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <rect x="300" y="16" width="135" height="3" rx="1.5" fill="url(#g3)"/>
  <text x="317" y="46" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#94a3b8">🔄</text>
  <text x="317" y="80" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="900" fill="#6ee7b7" letter-spacing="-1">12</text>
  <text x="317" y="98" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">Product Teams</text>
  <text x="317" y="112" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">Transformed (Agile)</text>

  <!-- Card 4 -->
  <rect x="445" y="16" width="135" height="108" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <rect x="445" y="16" width="135" height="3" rx="1.5" fill="url(#g4)"/>
  <text x="462" y="46" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#94a3b8">⚡</text>
  <text x="462" y="80" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="900" fill="#f9a8d4" letter-spacing="-1">15+</text>
  <text x="462" y="98" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">Team Members</text>
  <text x="462" y="112" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">Freed via Automation</text>

  <!-- Card 5 -->
  <rect x="590" y="16" width="135" height="108" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <rect x="590" y="16" width="135" height="3" rx="1.5" fill="url(#g5)"/>
  <text x="607" y="46" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#94a3b8">📦</text>
  <text x="607" y="80" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="900" fill="#fdba74" letter-spacing="-1">5</text>
  <text x="607" y="98" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">Parallel Initiatives</text>
  <text x="607" y="112" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">Delivered On Schedule</text>

  <!-- Card 6 -->
  <rect x="755" y="16" width="135" height="108" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <rect x="755" y="16" width="135" height="3" rx="1.5" fill="url(#g6)"/>
  <text x="772" y="46" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#94a3b8">⏱️</text>
  <text x="772" y="80" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="900" fill="#93c5fd" letter-spacing="-1">70%</text>
  <text x="772" y="98" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">Faster Escalation</text>
  <text x="772" y="112" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9.5" font-weight="500" fill="#475569">Resolution (10d → 3d)</text>
</svg>

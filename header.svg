<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0d0d1a"/>
      <stop offset="50%"  style="stop-color:#0f0a2e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="avatarRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#7c3aed"/>
      <stop offset="50%"  style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="avatarInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#1e1040"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="glowBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#7c3aed;stop-opacity:0"/>
      <stop offset="25%"  style="stop-color:#7c3aed"/>
      <stop offset="50%"  style="stop-color:#06b6d4"/>
      <stop offset="75%"  style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#7c3aed"/>
      <stop offset="50%"  style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Orbs — same layered circle technique as working SVGs -->
  <circle cx="60"  cy="80"  r="180" fill="#7c3aed" fill-opacity="0.15"/>
  <circle cx="60"  cy="80"  r="100" fill="#7c3aed" fill-opacity="0.10"/>
  <circle cx="800" cy="210" r="150" fill="#06b6d4" fill-opacity="0.12"/>
  <circle cx="800" cy="210" r="80"  fill="#06b6d4" fill-opacity="0.08"/>
  <circle cx="840" cy="40"  r="110" fill="#ec4899" fill-opacity="0.11"/>
  <circle cx="840" cy="40"  r="60"  fill="#ec4899" fill-opacity="0.08"/>

  <!-- Grid lines -->
  <g stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.07">
    <line x1="0" y1="40"  x2="900" y2="40"/>
    <line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="40"  y1="0" x2="40"  y2="280"/>
    <line x1="80"  y1="0" x2="80"  y2="280"/>
    <line x1="120" y1="0" x2="120" y2="280"/>
    <line x1="160" y1="0" x2="160" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="240" y1="0" x2="240" y2="280"/>
    <line x1="280" y1="0" x2="280" y2="280"/>
    <line x1="320" y1="0" x2="320" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="440" y1="0" x2="440" y2="280"/>
    <line x1="480" y1="0" x2="480" y2="280"/>
    <line x1="520" y1="0" x2="520" y2="280"/>
    <line x1="560" y1="0" x2="560" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="640" y1="0" x2="640" y2="280"/>
    <line x1="680" y1="0" x2="680" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
    <line x1="760" y1="0" x2="760" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
    <line x1="840" y1="0" x2="840" y2="280"/>
    <line x1="880" y1="0" x2="880" y2="280"/>
  </g>

  <!-- Card -->
  <rect x="24" y="24" width="852" height="232" rx="18" fill="url(#cardBg)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.1"/>
  <!-- Top gradient bar on card — same as metrics cards -->
  <rect x="24" y="24" width="852" height="3" rx="1.5" fill="url(#topBar)"/>
  <!-- Inner top highlight -->
  <rect x="25" y="28" width="850" height="1" fill="#ffffff" fill-opacity="0.06"/>

  <!-- Avatar ring + inner — using drop-shadow same as skills dots -->
  <circle cx="116" cy="144" r="52" fill="url(#avatarRing)" filter="drop-shadow(0 0 8px #7c3aed)"/>
  <circle cx="116" cy="144" r="48" fill="url(#avatarInner)"/>
  <text x="116" y="154" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="26" font-weight="900" fill="#ffffff">DK</text>

  <!-- Eyebrow label -->
  <text x="196" y="68"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="9" font-weight="700" fill="#334155" letter-spacing="4">SENIOR PROJECT MANAGER · SENIOR SCRUM MASTER · MOHALI, INDIA</text>

  <!-- Name — "Deven" white, "Kashyap" purple (flat colour, proven safe) -->
  <text x="196" y="118"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="44" font-weight="900" fill="#ffffff" letter-spacing="-2">Deven</text>
  <text x="356" y="118"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="44" font-weight="900" fill="#a78bfa" letter-spacing="-2"> Kashyap</text>

  <!-- Subtitle -->
  <text x="196" y="148"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="12.5" fill="#94a3b8">Agile Transformation Leader  ·  PMO Architect  ·  AI Automation Builder</text>

  <!-- Tags — identical pill style to skills.svg chips -->
  <rect x="196" y="163" width="90"  height="24" rx="12" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="212" cy="175" r="3.5" fill="#a78bfa" filter="drop-shadow(0 0 3px #7c3aed)"/>
  <text x="220" y="179"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="11" font-weight="600" fill="#c4b5fd">8.5+ Years</text>

  <rect x="296" y="163" width="156" height="24" rx="12" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="312" cy="175" r="3.5" fill="#67e8f9" filter="drop-shadow(0 0 3px #06b6d4)"/>
  <text x="320" y="179"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="11" font-weight="600" fill="#67e8f9">Agile · PMO · n8n · GenAI</text>

  <rect x="462" y="163" width="192" height="24" rx="12" fill="#ec4899" fill-opacity="0.12" stroke="#ec4899" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="478" cy="175" r="3.5" fill="#f9a8d4" filter="drop-shadow(0 0 3px #ec4899)"/>
  <text x="486" y="179"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="11" font-weight="600" fill="#f9a8d4">Banking · Healthcare · SaaS</text>

  <!-- Divider -->
  <line x1="692" y1="44" x2="692" y2="236" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>

  <!-- Stat 1: 60+ -->
  <text x="760" y="100" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="28" font-weight="900" fill="#a78bfa" letter-spacing="-1">60+</text>
  <text x="760" y="116" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="8.5" font-weight="600" fill="#475569" letter-spacing="1.5">PEOPLE LED</text>

  <!-- Stat 2: 2M+ -->
  <text x="760" y="156" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="28" font-weight="900" fill="#67e8f9" letter-spacing="-1">2M+</text>
  <text x="760" y="172" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="8.5" font-weight="600" fill="#475569" letter-spacing="1.5">CUSTOMERS</text>

  <!-- Stat 3: 12 teams -->
  <text x="760" y="212" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="28" font-weight="900" fill="#f9a8d4" letter-spacing="-1">12</text>
  <text x="760" y="228" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="8.5" font-weight="600" fill="#475569" letter-spacing="1.5">TEAMS TRANSFORMED</text>

  <!-- Bottom glow bar — static, same as metrics top bars -->
  <rect x="24" y="253" width="852" height="2" rx="1" fill="url(#glowBar)"/>
</svg>

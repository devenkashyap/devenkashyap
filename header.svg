<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="45%" stop-color="#0f0a2e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="glowBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#06b6d4" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#ec4899" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="avatarRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="avatarInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1040"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="statPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="statCyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="statPink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Orbs — no filter, just radial gradients with opacity -->
  <circle cx="60"  cy="80"  r="180" fill="#7c3aed" fill-opacity="0.18"/>
  <circle cx="60"  cy="80"  r="120" fill="#7c3aed" fill-opacity="0.12"/>
  <circle cx="800" cy="200" r="150" fill="#06b6d4" fill-opacity="0.14"/>
  <circle cx="800" cy="200" r="90"  fill="#06b6d4" fill-opacity="0.10"/>
  <circle cx="830" cy="40"  r="110" fill="#ec4899" fill-opacity="0.13"/>
  <circle cx="830" cy="40"  r="65"  fill="#ec4899" fill-opacity="0.09"/>

  <!-- Grid -->
  <g opacity="0.07" stroke="#7c3aed" stroke-width="0.5">
    <line x1="0"   y1="40"  x2="900" y2="40"/>
    <line x1="0"   y1="80"  x2="900" y2="80"/>
    <line x1="0"   y1="120" x2="900" y2="120"/>
    <line x1="0"   y1="160" x2="900" y2="160"/>
    <line x1="0"   y1="200" x2="900" y2="200"/>
    <line x1="0"   y1="240" x2="900" y2="240"/>
    <line x1="40"  y1="0"   x2="40"  y2="280"/>
    <line x1="80"  y1="0"   x2="80"  y2="280"/>
    <line x1="120" y1="0"   x2="120" y2="280"/>
    <line x1="160" y1="0"   x2="160" y2="280"/>
    <line x1="200" y1="0"   x2="200" y2="280"/>
    <line x1="240" y1="0"   x2="240" y2="280"/>
    <line x1="280" y1="0"   x2="280" y2="280"/>
    <line x1="320" y1="0"   x2="320" y2="280"/>
    <line x1="360" y1="0"   x2="360" y2="280"/>
    <line x1="400" y1="0"   x2="400" y2="280"/>
    <line x1="440" y1="0"   x2="440" y2="280"/>
    <line x1="480" y1="0"   x2="480" y2="280"/>
    <line x1="520" y1="0"   x2="520" y2="280"/>
    <line x1="560" y1="0"   x2="560" y2="280"/>
    <line x1="600" y1="0"   x2="600" y2="280"/>
    <line x1="640" y1="0"   x2="640" y2="280"/>
    <line x1="680" y1="0"   x2="680" y2="280"/>
    <line x1="720" y1="0"   x2="720" y2="280"/>
    <line x1="760" y1="0"   x2="760" y2="280"/>
    <line x1="800" y1="0"   x2="800" y2="280"/>
    <line x1="840" y1="0"   x2="840" y2="280"/>
    <line x1="880" y1="0"   x2="880" y2="280"/>
  </g>

  <!-- Card -->
  <rect x="24" y="24" width="852" height="232" rx="18" fill="url(#cardBg)"/>
  <rect x="24" y="24" width="852" height="232" rx="18" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.1"/>
  <rect x="25" y="25" width="850" height="1" rx="1" fill="#ffffff" fill-opacity="0.07"/>

  <!-- Avatar ring -->
  <circle cx="116" cy="140" r="52" fill="url(#avatarRing)"/>
  <!-- Avatar inner -->
  <circle cx="116" cy="140" r="48" fill="url(#avatarInner)"/>
  <!-- Avatar initials -->
  <text x="116" y="150" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" font-weight="900" fill="#ffffff" letter-spacing="-1">DK</text>

  <!-- Eyebrow -->
  <text x="196" y="82" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="10" font-weight="700" fill="#06b6d4" letter-spacing="3">SENIOR PROGRAM MANAGER · MOHALI, INDIA</text>

  <!-- Name -->
  <text x="196" y="130" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="42" font-weight="900" fill="#ffffff"    letter-spacing="-2">Deven</text>
  <text x="345" y="130" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="42" font-weight="900" fill="url(#nameGrad)" letter-spacing="-2"> Kashyap</text>

  <!-- Subtitle -->
  <text x="196" y="158" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#94a3b8">Agile Transformation Leader  ·  PMO Architect  ·  AI Automation Builder</text>

  <!-- Tag 1 -->
  <rect x="196" y="172" width="88"  height="24" rx="12" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.45"/>
  <text x="240" y="188" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600" fill="#c4b5fd">8.5+ Years</text>

  <!-- Tag 2 -->
  <rect x="294" y="172" width="150" height="24" rx="12" fill="#06b6d4" fill-opacity="0.14" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  <text x="369" y="188" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600" fill="#67e8f9">Agile · PMO · n8n · GenAI</text>

  <!-- Tag 3 -->
  <rect x="454" y="172" width="188" height="24" rx="12" fill="#ec4899" fill-opacity="0.14" stroke="#ec4899" stroke-width="1" stroke-opacity="0.4"/>
  <text x="548" y="188" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="600" fill="#f9a8d4">Banking · Healthcare · SaaS</text>

  <!-- Divider -->
  <line x1="688" y1="56" x2="688" y2="224" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>

  <!-- Stat 1 -->
  <text x="756" y="108" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="900" fill="url(#statPurple)" letter-spacing="-1">60+</text>
  <text x="756" y="124" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9"  font-weight="600" fill="#64748b" letter-spacing="1.5">PEOPLE LED</text>

  <!-- Stat 2 -->
  <text x="756" y="162" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="900" fill="url(#statCyan)" letter-spacing="-1">2M+</text>
  <text x="756" y="178" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9"  font-weight="600" fill="#64748b" letter-spacing="1.5">CUSTOMERS</text>

  <!-- Stat 3 -->
  <text x="756" y="216" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="900" fill="url(#statPink)" letter-spacing="-1">12</text>
  <text x="756" y="232" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9"  font-weight="600" fill="#64748b" letter-spacing="1.5">TEAMS TRANSFORMED</text>

  <!-- Bottom glow bar -->
  <rect x="24" y="254" width="852" height="2" rx="1" fill="url(#glowBar)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
